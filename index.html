<style>
:root {
  --ink: #0f1117;
  --paper: #f5f2eb;
  --cream: #ede9df;
  --gold: #c9a84c;
  --gold-light: #e8d4a0;
  --red: #c0392b;
  --red-light: #fdf0ee;
  --amber: #d68910;
  --amber-light: #fef9ec;
  --green: #1a7a4a;
  --green-light: #edf7f2;
  --blue: #1a4a7a;
  --blue-light: #edf2f7;
  --border: rgba(15, 17, 23, 0.12);
  --shadow: 0 1px 3px rgba(15,17,23,0.06), 0 4px 12px rgba(15,17,23,0.04);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--paper); color: var(--ink); font-family: "Open Sans", sans-serif; line-height: 1.55; -webkit-font-smoothing: antialiased; }
h1, h2, h3, h4 { font-family: "Roboto", sans-serif; font-weight: 700; letter-spacing: -0.01em; }
.mono { font-family: "DM Mono", monospace; }
button { font-family: "Open Sans", sans-serif; cursor: pointer; border: none; background: none; }

/* Header */
.app-header {
  position: sticky; top: 0; z-index: 100;
  background: var(--ink); color: var(--paper);
  border-bottom: 2px solid var(--gold);
  padding: 14px 24px;
  display: flex; align-items: center; justify-content: space-between;
}
.app-header .title { font-family: "Roboto", sans-serif; font-weight: 700; font-size: 15px; letter-spacing: 0.02em; }
.app-header .title span { color: var(--gold); }
.app-header .meta { font-family: "DM Mono", monospace; font-size: 12px; color: var(--gold-light); display: flex; gap: 16px; }

/* Main container */
.screen {
  max-width: 1100px; margin: 0 auto; padding: 32px 24px 64px;
  animation: fadeIn 0.45s ease both;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Hero */
.hero {
  background: var(--ink); color: var(--paper);
  border-radius: 12px; padding: 36px 32px; margin-bottom: 24px;
  position: relative; overflow: hidden;
  box-shadow: var(--shadow);
}
.hero::before {
  content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
}
.hero .eyebrow { font-family: "DM Mono", monospace; font-size: 11px; color: var(--gold); letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 12px; }
.hero h1 { font-size: 36px; line-height: 1.15; margin-bottom: 12px; }
.hero h1 span { color: var(--gold); }
.hero .sub { font-size: 15px; color: rgba(245, 242, 235, 0.78); max-width: 720px; }
.hero .meta-row { margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(245,242,235,0.15); display: flex; gap: 28px; flex-wrap: wrap; font-family: "DM Mono", monospace; font-size: 12px; color: var(--gold-light); }
.hero .meta-row span strong { color: var(--paper); font-weight: 500; }

/* Section heading */
.section-heading { font-size: 11px; font-family: "DM Mono", monospace; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(15,17,23,0.55); margin-bottom: 10px; }

/* Cards */
.card {

  padding: 22px; margin-bottom: 16px; box-shadow: var(--shadow);
}
.card h2 { font-size: 18px; margin-bottom: 4px; }
.card h3 { font-size: 15px; margin-bottom: 8px; }
.card .card-eyebrow { font-family: "DM Mono", monospace; font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(15,17,23,0.5); margin-bottom: 6px; }

/* Portfolio table */
.portfolio-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
.portfolio-table th, .portfolio-table td { padding: 12px 14px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
.portfolio-table th { font-family: "DM Mono", monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(15,17,23,0.55); font-weight: 500; }
.portfolio-table td.num { font-family: "DM Mono", monospace; text-align: right; }

.profile-badge {

/* Team input */

.init-card:hover:not(.selected) { border-color: rgba(15,17,23,0.25); }
.init-card .init-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; gap: 12px; }
.init-card .init-name { font-family: "Roboto", sans-serif; font-weight: 700; font-size: 15px; }

.init-card .init-meta { display: flex; gap: 16px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); font-family: "DM Mono", monospace; font-size: 11px; color: rgba(15,17,23,0.6); }
.init-card .init-meta strong { color: var(--ink); font-weight: 500; }
.init-card input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--gold); cursor: pointer; }

/* Investment selectors */
.invest-row { display: grid; grid-template-columns: 110px 1fr; gap: 16px; align-items: center; margin-bottom: 14px; }
.invest-row .bu-label { font-family: "Roboto", sans-serif; font-weight: 700; font-size: 15px; }
.invest-row .bu-sub { font-family: "DM Mono", monospace; font-size: 10px; color: rgba(15,17,23,0.55); margin-top: 2px; }
.invest-options { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.invest-opt {

/* Dividend panel */
.dividend-panel {

.div-opt .div-detail { font-family: "DM Mono", monospace; font-size: 10.5px; color: rgba(15,17,23,0.65); line-height: 1.55; }

/* Active initiatives */
.active-init-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

/* Results — BU cards */
.results-grid { display: grid; gap: 14px; margin-top: 16px; }

/* Wildcard panel */
.wildcard-panel {

/* Revised estimate panel */
.revised-panel {
  background: rgba(15,17,23,0.03); border: 1px dashed var(--border);
  border-radius: 8px; padding: 12px 14px; margin-top: 10px;

}
.revised-panel .rp-label { font-family: "DM Mono", monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(15,17,23,0.55); margin-bottom: 4px; }

.revised-panel .rp-original { text-decoration: line-through; color: rgba(15,17,23,0.45); }

/* Dividend results card */
.dividend-card {
  background: #fffdf6; border: 1px solid var(--gold-light); border-radius: 12px;
  padding: 22px; margin-top: 14px; border-left: 4px solid var(--gold);
}

// ============================================================
//  RNG / UTILITIES
// ============================================================
function rand(min, max) { return Math.random() * (max - min) + min; }
function randInt(min, max) { return Math.floor(rand(min, max + 1)); }
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function pickWeighted(weights) {
  const total = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < weights.length; i++) {
    r -= weights[i];
    if (r <= 0) return i;
  }
  return weights.length - 1;
}

// ============================================================
//  STARTING PORTFOLIO
// ============================================================
function rollStartingPortfolio() {
  // H1: discrete revenue/margin pairs
  const h1Options = [
    { rev: 1000, margin: 5, profile: "Constrained Core" },
    { rev: 4000, margin: 15, profile: "Balanced Core" },
    { rev: 8000, margin: 25, profile: "Strong Core" }
  ];
  const h1Pick = h1Options[randInt(0, 2)];

  // H2: revenue 500–3500 (round to 100), margin 2–5 (round to 0.5), ceiling 5
  let h2Rev = Math.round(rand(500, 3500) / 100) * 100;
  if (h2Rev < 500) h2Rev = 500;
  if (h2Rev > 3500) h2Rev = 3500;
  let h2Margin = Math.round(rand(2, 5) / 0.5) * 0.5;
  if (h2Margin < 2) h2Margin = 2;
  if (h2Margin > 5) h2Margin = 5;

  state.portfolio.h1 = { rev: h1Pick.rev, margin: h1Pick.margin, startRev: h1Pick.rev, startMargin: h1Pick.margin };
  state.portfolio.h2 = { rev: h2Rev, margin: h2Margin, startRev: h2Rev, startMargin: h2Margin };
  state.portfolioProfile = h1Pick.profile;

  state.startH1Profit = h1Pick.rev * (h1Pick.margin / 100);
  state.startH2Profit = h2Rev * (h2Margin / 100);
  state.startTotalProfit = state.startH1Profit + state.startH2Profit;
  state.startTotalRevenue = h1Pick.rev + h2Rev;
}

// ============================================================
//  H3 INITIATIVE DRAW + JITTER
// ============================================================
function drawInitiatives() {
  // 25% chance of 0, 1, 2, 3
  const count = randInt(0, 3);
  if (count === 0) { state.drawn = []; return; }
  const shuffled = shuffle(INITIATIVE_POOL);
  const picked = shuffled.slice(0, count);
  const labels = ["A", "B", "C"];
  state.drawn = picked.map((init, idx) => {
    // ±18% size, ±6pp probabilities
    const sizeJitterMin = init.sizeMin * rand(0.82, 1.18);
    const sizeJitterMax = init.sizeMax * rand(0.82, 1.18);
    const jitterPp = () => (Math.random() * 0.12) - 0.06;
    const moonshotCap = (p, jitter) => {
      // moonshot skew downward
      let v = p + (jitter * (jitter > 0 ? 0.5 : 1.2));
      return Math.min(v, 0.50);
    };
    const roofshotCap = (p, jitter) => {
      // roofshot skew upward
      let v = p + (jitter * (jitter > 0 ? 1.2 : 0.6));
      return Math.min(v, 0.80);
    };
    const applyP = (base) => {
      const j = jitterPp();
      if (init.type === "Moonshot") return Math.max(0.01, moonshotCap(base, j));
      return Math.max(0.01, roofshotCap(base, j));
    };
    return {
      label: labels[idx],
      id: init.id,
      name: init.name,
      type: init.type,
      desc: init.desc,
      sizeMin: Math.round(Math.min(sizeJitterMin, sizeJitterMax)),
      sizeMax: Math.round(Math.max(sizeJitterMin, sizeJitterMax)),
      origSizeMin: Math.round(Math.min(sizeJitterMin, sizeJitterMax)),
      origSizeMax: Math.round(Math.max(sizeJitterMin, sizeJitterMax)),
      curSizeMin: Math.round(Math.min(sizeJitterMin, sizeJitterMax)),
      curSizeMax: Math.round(Math.max(sizeJitterMin, sizeJitterMax)),
      r2_single: applyP(init.r2_single),
      r2_sustained: applyP(init.r2_sustained),
      r3_sustained: applyP(init.r3_sustained),
      r3_gap: applyP(init.r3_gap),
      status: "active", // active, success, failed, closed
      revenue: 0,
      investHistory: [], // per round: true if invested
      successRound: null,
      revisedSentiment: "",
      revisedDirection: ""
    };
  });
}

// ============================================================
//  WILDCARD ASSIGNMENT
// ============================================================
function rollWildcard() {
  // 75% chance of a wildcard at all
  if (Math.random() >= 0.75) { state.wildcardRound = 0; state.wildcardEvent = null; return; }
  // Distribute round: R1 20%, R2 40%, R3 40%
  const r = Math.random();
  if (r < 0.20) state.wildcardRound = 1;
  else if (r < 0.60) state.wildcardRound = 2;
  else state.wildcardRound = 3;
  // Event: 25% each of three (or none)
  const eventRoll = randInt(0, 3);
  const events = ["H1_SHOCK", "H1_REG", "H2_TAIL", "NONE"];
  state.wildcardEvent = events[eventRoll];
  if (state.wildcardEvent === "NONE") { state.wildcardRound = 0; state.wildcardEvent = null; }
}

// ============================================================
//  BUDGET CALC
// ============================================================
function budgetForProfit(profit) {
  if (profit > 1800) return 260;
  if (profit >= 1400) return 230;
  if (profit >= 1000) return 200;
  if (profit >= 600) return 170;
  return 140;
}
const BUCKETS = {
  260: { Low: 40, Medium: 80, High: 140 },
  230: { Low: 35, Medium: 70, High: 125 },
  200: { Low: 30, Medium: 60, High: 110 },
  170: { Low: 25, Medium: 50, High: 95 },
  140: { Low: 20, Medium: 40, High: 80 }
};
function bucketAmounts(budget) { return BUCKETS[budget]; }

function dividendRate(level) { return { Low: 0.15, Medium: 0.30, High: 0.50 }[level]; }

// ============================================================
//  BUSINESS DYNAMICS RATES (per year)
// ============================================================
const H1_REV_DECLINE = { Zero: -0.18, Low: -0.15, Medium: -0.12, High: -0.10 };
const H1_MARGIN_DECLINE = { Zero: -3, Low: -2.5, Medium: -2, High: -1.5 };
function h2RevGrowth(level, round) {
  const table = {
    Zero:   [0.05, 0.02, 0.01],
    Low:    [0.10, 0.05, 0.03],
    Medium: [0.20, 0.10, 0.05],
    High:   [0.25, 0.13, 0.07]
  };
  return table[level][round - 1];
}
function h2MarginImprove(level, round) {
  const base = [1.5, 2.0, 1.5][round - 1];
  if (level === "High") return base + 0.5;
  if (level === "Medium") return base;
  if (level === "Low") return base - 0.5;
  return 0; // Zero
}

// Bucket weights for interpolation (0-init case)
const BUCKET_WEIGHT = { Zero: 0, Low: 0.33, Medium: 0.67, High: 1.0 };

// Interpolate H1 rev decline based on effective ₹ vs bucket anchor amounts
function interpolateH1RevDecline(effectiveRupees, budget) {
  const b = bucketAmounts(budget);
  const anchors = [
    { rupees: 0, rate: H1_REV_DECLINE.Zero },
    { rupees: b.Low, rate: H1_REV_DECLINE.Low },
    { rupees: b.Medium, rate: H1_REV_DECLINE.Medium },
    { rupees: b.High, rate: H1_REV_DECLINE.High }
  ];
  if (effectiveRupees >= b.High) return H1_REV_DECLINE.High;
  for (let i = 1; i < anchors.length; i++) {
    if (effectiveRupees <= anchors[i].rupees) {
      const lo = anchors[i-1], hi = anchors[i];
      const t = (effectiveRupees - lo.rupees) / (hi.rupees - lo.rupees);
      return lo.rate + t * (hi.rate - lo.rate);
    }
  }
  return H1_REV_DECLINE.High;
}
function interpolateH1MarginDecline(effectiveRupees, budget) {
  const b = bucketAmounts(budget);
  const anchors = [
    { rupees: 0, rate: H1_MARGIN_DECLINE.Zero },
    { rupees: b.Low, rate: H1_MARGIN_DECLINE.Low },
    { rupees: b.Medium, rate: H1_MARGIN_DECLINE.Medium },
    { rupees: b.High, rate: H1_MARGIN_DECLINE.High }
  ];
  if (effectiveRupees >= b.High) return H1_MARGIN_DECLINE.High;
  for (let i = 1; i < anchors.length; i++) {
    if (effectiveRupees <= anchors[i].rupees) {
      const lo = anchors[i-1], hi = anchors[i];
      const t = (effectiveRupees - lo.rupees) / (hi.rupees - lo.rupees);
      return lo.rate + t * (hi.rate - lo.rate);
    }
  }
  return H1_MARGIN_DECLINE.High;
}
function interpolateH2RevGrowth(effectiveRupees, budget, round) {
  const b = bucketAmounts(budget);
  const anchors = [
    { rupees: 0, rate: h2RevGrowth("Zero", round) },
    { rupees: b.Low, rate: h2RevGrowth("Low", round) },
    { rupees: b.Medium, rate: h2RevGrowth("Medium", round) },
    { rupees: b.High, rate: h2RevGrowth("High", round) }
  ];
  if (effectiveRupees >= b.High) return h2RevGrowth("High", round);
  for (let i = 1; i < anchors.length; i++) {
    if (effectiveRupees <= anchors[i].rupees) {
      const lo = anchors[i-1], hi = anchors[i];
      const t = (effectiveRupees - lo.rupees) / (hi.rupees - lo.rupees);
      return lo.rate + t * (hi.rate - lo.rate);
    }
  }
  return h2RevGrowth("High", round);
}
function interpolateH2MarginImprove(effectiveRupees, budget, round) {
  const b = bucketAmounts(budget);
  const anchors = [
    { rupees: 0, rate: h2MarginImprove("Zero", round) },
    { rupees: b.Low, rate: h2MarginImprove("Low", round) },
    { rupees: b.Medium, rate: h2MarginImprove("Medium", round) },
    { rupees: b.High, rate: h2MarginImprove("High", round) }
  ];
  if (effectiveRupees >= b.High) return h2MarginImprove("High", round);
  for (let i = 1; i < anchors.length; i++) {
    if (effectiveRupees <= anchors[i].rupees) {
      const lo = anchors[i-1], hi = anchors[i];
      const t = (effectiveRupees - lo.rupees) / (hi.rupees - lo.rupees);
      return lo.rate + t * (hi.rate - lo.rate);
    }
  }
  return h2MarginImprove("High", round);
}

// Apply 3 years of compounding given a per-year rate (relative) for revenue, or absolute for margin
function compoundRevenue(startRev, perYearRate) {
  return startRev * Math.pow(1 + perYearRate, 3);
}
function applyAbsMargin(startMargin, perYearAbs) {
  // perYearAbs is in percentage points (e.g. -1.5 means -1.5pp per year)
  return startMargin + perYearAbs * 3;
}

// ============================================================
//  CAGR HELPERS
// ============================================================
function cagr(startVal, endVal, years) {
  if (!startVal || startVal <= 0 || endVal <= 0) return null;
  return (Math.pow(endVal / startVal, 1 / years) - 1) * 100;
}
function fmtCagr(pct) {
  if (pct === null) return "n/a";
  return (pct >= 0 ? "+" : "") + pct.toFixed(1) + "%";
}

// ============================================================
//  VALUATION
// ============================================================
function computeValuation() {
  const p = state.portfolio;
  const h1Val = p.h1.rev * 0.6;
  const h2Val = p.h2.rev * 5;
  let h3Val = 0;
  let h3SuccessVal = 0;
  let h3OptionalityVal = 0;
  p.h3.forEach(init => {
    if (init.status === "success") {
      const h3Multiple = init.successRound === 2 ? 6 : 3;
      h3SuccessVal += init.revenue * h3Multiple;
    } else if (init.status === "active") {
      // probability-weighted max potential × 4
      // Use sustained probability for next roll context; simplify by using r3_sustained
      const probContext = state.round === 0 ? init.r2_sustained : (state.round === 1 ? init.r2_sustained : init.r3_sustained);
      h3OptionalityVal += init.curSizeMax * probContext * 4;
    }
  });
  h3Val = h3SuccessVal + h3OptionalityVal;
  return {
    h1: h1Val, h2: h2Val, h3: h3Val,
    h3Success: h3SuccessVal, h3Optionality: h3OptionalityVal,
    total: h1Val + h2Val + h3Val
  };
}

// ============================================================
//  ROUND RUN
// ============================================================
function runRound(roundNum, selection) {
  // selection: { h1: "High"/"Medium"/"Low"/"Zero", h2: same, h3: same, div: "Low"/"Medium"/"High",
  //              h1Eff, h2Eff, h3Eff }  (effective rupees)
  const result = {
    round: roundNum,
    budget: state.currentBudget,
    h1: selection.h1, h2: selection.h2, h3: selection.h3,
    h1Eff: selection.h1Eff, h2Eff: selection.h2Eff, h3Eff: selection.h3Eff,
    div: selection.div,
    wildcard: null,
    h1Before: { rev: state.portfolio.h1.rev, margin: state.portfolio.h1.margin },
    h2Before: { rev: state.portfolio.h2.rev, margin: state.portfolio.h2.margin },
    h3Rolls: [],
    profit: 0,
    divPaid: 0,
    retained: 0,
    nextBudget: 0,
    valuation: null
  };

  // Fire wildcard if scheduled
  const wcThisRound = (state.wildcardRound === roundNum && state.wildcardEvent);
  result.wildcard = wcThisRound ? state.wildcardEvent : null;

  // Determine if zero-initiative case (uses blended effective amounts)
  const zeroInitCase = state.portfolio.h3.length === 0;

  // ---- H1 dynamics ----
  let h1RevRate, h1MarginRate;
  if (zeroInitCase) {
    h1RevRate = interpolateH1RevDecline(selection.h1Eff, state.currentBudget);
    h1MarginRate = interpolateH1MarginDecline(selection.h1Eff, state.currentBudget);
  } else {
    h1RevRate = H1_REV_DECLINE[selection.h1];
    h1MarginRate = H1_MARGIN_DECLINE[selection.h1];
  }
  let newH1Rev = compoundRevenue(state.portfolio.h1.rev, h1RevRate);
  // Apply wildcard to H1
  if (wcThisRound) {
    if (state.wildcardEvent === "H1_SHOCK") newH1Rev *= 0.40;  // -60%
    if (state.wildcardEvent === "H1_REG") newH1Rev *= 0.60;    // -40%
  }
  let newH1Margin = applyAbsMargin(state.portfolio.h1.margin, h1MarginRate);
  if (newH1Margin < 0) newH1Margin = 0;
  state.portfolio.h1.rev = newH1Rev;
  state.portfolio.h1.margin = newH1Margin;

  // ---- H2 dynamics ----
  let h2RevRate, h2MarginRate;
  if (zeroInitCase) {
    h2RevRate = interpolateH2RevGrowth(selection.h2Eff, state.currentBudget, roundNum);
    h2MarginRate = interpolateH2MarginImprove(selection.h2Eff, state.currentBudget, roundNum);
  } else {
    h2RevRate = h2RevGrowth(selection.h2, roundNum);
    h2MarginRate = h2MarginImprove(selection.h2, roundNum);
  }
  // Wildcard tailwind: +20% absolute growth rate addition
  if (wcThisRound && state.wildcardEvent === "H2_TAIL") {
    h2RevRate += 0.20;
  }
  let newH2Rev = compoundRevenue(state.portfolio.h2.rev, h2RevRate);
  let newH2Margin = applyAbsMargin(state.portfolio.h2.margin, h2MarginRate);
  if (newH2Margin < 0) newH2Margin = 0;
  state.portfolio.h2.rev = newH2Rev;
  state.portfolio.h2.margin = newH2Margin;

  // ---- H3 dynamics ----
  state.portfolio.h3.forEach(init => {
    if (init.status === "closed" || init.status === "failed") return;
    if (init.status === "success") {
      // compound at +15%/yr for 3 years
      init.revenue = init.revenue * Math.pow(1.15, 3);
      return;
    }
    // active
    const investedThisRound = (selection.h3 !== "Zero");
    init.investHistory.push(investedThisRound);

    if (!investedThisRound) {
      // Zero chosen: permanently close
      init.status = "closed";
      result.h3Rolls.push({ id: init.id, name: init.name, outcome: "closed" });
      return;
    }
    // Roll based on round and history
    let prob = 0;
    let rollNow = false;
    if (roundNum === 1) {
      rollNow = false; // too early
    } else if (roundNum === 2) {
      const r1Inv = init.investHistory[0];
      if (r1Inv) { prob = init.r2_sustained; rollNow = true; }
      else { prob = init.r2_single; rollNow = true; }
    } else if (roundNum === 3) {
      const r1Inv = init.investHistory[0];
      const r2Inv = init.investHistory[1];
      if (r1Inv && r2Inv) { prob = init.r3_sustained; rollNow = true; }
      else if (!r2Inv && r1Inv) { prob = init.r3_gap; rollNow = true; }
      else if (!r1Inv && r2Inv) { prob = init.r3_gap; rollNow = true; }
      else { prob = init.r3_sustained; rollNow = true; } // invested R3 only
    }
    if (rollNow) {
      const success = Math.random() < prob;
      if (success) {
        init.status = "success";
        init.revenue = rand(init.curSizeMin, init.curSizeMax);
        init.successRound = roundNum;
        result.h3Rolls.push({ id: init.id, name: init.name, outcome: "success", revenue: init.revenue });
      } else {
        if (roundNum === 3) {
          // final roll: written off
          init.status = "failed";
          result.h3Rolls.push({ id: init.id, name: init.name, outcome: "failed" });
        } else {
          result.h3Rolls.push({ id: init.id, name: init.name, outcome: "miss" });
        }
      }
    } else {
      result.h3Rolls.push({ id: init.id, name: init.name, outcome: "progressing" });
    }
  });

  // Revise estimates (R1 & R2 only — R3 has no future)
  if (roundNum === 1 || roundNum === 2) {
    state.portfolio.h3.forEach(init => {
      if (init.status !== "active") return;
      const r1Inv = init.investHistory[0];
      const r2Inv = init.investHistory[1];
      let mult, sentiment, dir;
      if (roundNum === 1) {
        if (r1Inv) {
          mult = rand(0.88, 1.16);
          if (Math.random() < 0.6) { sentiment = "\u2191 Revised up"; dir = "up"; }
          else { sentiment = "~ Estimate updated"; dir = "mixed"; }
        } else {
          mult = rand(0.65, 0.83);
          sentiment = "\u2193 Revised down"; dir = "down";
        }
      } else {
        // R2
        if (r1Inv && r2Inv) {
          mult = rand(0.92, 1.18);
          if (Math.random() < 0.7) { sentiment = "\u2191 Revised up"; dir = "up"; }
          else { sentiment = "~ Estimate updated"; dir = "mixed"; }
        } else if (r1Inv || r2Inv) {
          mult = rand(0.78, 0.96);
          sentiment = "\u2193 Revised down"; dir = "down";
        } else {
          mult = rand(0.52, 0.76);
          sentiment = "\u2193 Significantly revised downward"; dir = "down";
        }
      }
      init.curSizeMin = Math.round(init.curSizeMin * mult);
      init.curSizeMax = Math.round(init.curSizeMax * mult);
      init.revisedSentiment = sentiment;
      init.revisedDirection = dir;
    });
  }

  // ---- Compute profit ----
  const h1Profit = state.portfolio.h1.rev * (state.portfolio.h1.margin / 100);
  const h2Profit = state.portfolio.h2.rev * (state.portfolio.h2.margin / 100);
  let h3Profit = 0;
  state.portfolio.h3.forEach(init => {
    if (init.status === "success") h3Profit += init.revenue * 0.05;
  });
  result.profit = h1Profit + h2Profit + h3Profit;
  result.h1Profit = h1Profit;
  result.h2Profit = h2Profit;
  result.h3Profit = h3Profit;

  // ---- Dividend ----
  if (result.profit <= 0) {
    result.divPaid = 0;
    result.retained = result.profit;
    result.zeroProfit = true;
  } else {
    result.divPaid = result.profit * dividendRate(selection.div);
    result.retained = result.profit - result.divPaid;
  }
  state.cumulativeDividends += result.divPaid;

  // ---- Next budget ----
  result.nextBudget = budgetForProfit(result.retained);
  state.priorProfit = result.profit;

  // ---- Valuation ----
  result.valuation = computeValuation();

  state.rounds.push(result);
  return result;
}

function toggleInit(id) {
  const card = document.getElementById("init-" + id);
  const chk = document.getElementById("chk-" + id);
  const idx = state.selected.indexOf(id);
  if (idx === -1) {
    state.selected.push(id);
    card.classList.add("selected");
    chk.checked = true;
  } else {
    state.selected.splice(idx, 1);
    card.classList.remove("selected");
    chk.checked = false;
  }
}
function completeH3Selection() {
  if (state.drawn.length > 0 && state.selected.length === 0) {

  html += "<span>PORTFOLIO VALUATION: <strong style=\"color:var(--ink);\">" + fmtCr(val.total) + "</strong></span>";

    html += renderInvestRow("h3", "H3", activeInits.length + " active initiative" + (activeInits.length > 1 ? "s" : ""), useFullThree, true, false, zeroInit);

    // H3 locked at Zero (silent) — describe accurately based on resolution mix
    const successCount = state.portfolio.h3.filter(i => i.status === "success").length;
    const failedCount = state.portfolio.h3.filter(i => i.status === "failed").length;
    const closedCount = state.portfolio.h3.filter(i => i.status === "closed").length;
    let subLabel = "No active initiatives";

    if (state.portfolio.h3.length > 0) {
      if (successCount > 0 && failedCount === 0 && closedCount === 0) {

      } else {

        rightLabel = "No active development";
      }
    }
    html += "<div class=\"invest-row\" style=\"opacity:0.6;\">";
    html += "<div><div class=\"bu-label\">H3</div><div class=\"bu-sub\">" + subLabel + "</div></div>";
    html += "<div style=\"font-family:'DM Mono',monospace;font-size:12px;color:rgba(15,17,23,0.55);padding:10px 0;\">" + rightLabel + "</div>";
    html += "</div>";
  }
  html += "</div>";

  // Effective rupees preview for zero-init case
  if (zeroInit || (!hasActiveH3 && state.portfolio.h3.length > 0)) {
    html += "<div id=\"effPreview\" style=\"margin-top:12px;\"></div>";
  }
  html += "</div>";

  // Dividend panel
  html += "<div class=\"dividend-panel\">";
  html += "<div class=\"card-eyebrow\">Decision 4 \u00b7 Capital Returns</div>";
  html += "<h3>Board Decision \u2014 Shareholder Returns</h3>";
  html += "<p class=\"sub\">Dividend policy is independent of investment allocation. Select the payout that best reflects the leadership team's view of capital priorities. Indicative figures below use prior-cycle profit as the basis.</p>";
  html += "<div class=\"dividend-options\">";
  ["Low", "Medium", "High"].forEach(level => {
    const rate = dividendRate(level);
    const indicativeDiv = state.priorProfit * rate;
    const indicativeRetained = state.priorProfit - indicativeDiv;
    const indicativeBudget = budgetForProfit(indicativeRetained);
    html += "<div class=\"div-opt\" data-level=\"" + level + "\" onclick=\"selectDiv('" + level + "')\">";

    html += "Indicative dividend: <strong>" + fmtCr(indicativeDiv) + "</strong><br>";
    html += "Indicative retained: <strong>" + fmtCr(indicativeRetained) + "</strong><br>";
    html += "Next-cycle budget tier: <strong>" + fmtCr(indicativeBudget) + "</strong>";
    html += "</div></div>";
  });
  html += "</div></div>";

  // Submit
  html += "<div id=\"allocError\"></div>";
  html += "<div style=\"margin-top:24px;\"><button class=\"btn-primary\" onclick=\"submitAllocation()\">Submit Cycle " + r + " Decisions</button></div>";

  html += "</div>";
  show(html);
  refreshEffectivePreview();

function renderInvestRow(buKey, buLabel, buSub, fullThree, allowZero, isClosed, zeroInit) {
  let html = "<div class=\"invest-row\">";
  html += "<div><div class=\"bu-label\">" + buLabel + "</div><div class=\"bu-sub\">" + buSub + "</div></div>";
  html += "<div class=\"invest-options\">";
  if (fullThree) {
    ["High", "Medium", "Low", "Zero"].forEach(level => {
      if (level === "Zero" && buKey !== "h3") {
        // H1/H2 can't be Zero in standard 3-way case
        html += "<div class=\"invest-opt disabled\" data-level=\"" + level + "\">" + level + "</div>";
      } else if (level === "Zero" && buKey === "h3" && !allowZero) {
        html += "<div class=\"invest-opt disabled\" data-level=\"" + level + "\">" + level + "</div>";
      } else {
        html += "<div class=\"invest-opt\" data-level=\"" + level + "\" onclick=\"selectInvest('" + buKey + "','" + level + "')\">" + level + "</div>";
      }
    });
  } else {
    // 2-way (H1 & H2 only): High and Low selectable; Medium and Zero greyed
    ["High", "Medium", "Low", "Zero"].forEach(level => {
      if (level === "High" || level === "Low") {
        html += "<div class=\"invest-opt\" data-level=\"" + level + "\" onclick=\"selectInvest('" + buKey + "','" + level + "')\">" + level + "</div>";
      } else if (level === "Medium") {
        html += "<div class=\"invest-opt disabled\" data-level=\"" + level + "\" title=\"Auto-split\">Auto-split</div>";
      } else {
        html += "<div class=\"invest-opt disabled\" data-level=\"" + level + "\">" + level + "</div>";
      }
    });
  }
  html += "</div></div>";
  return html;
}

function selectInvest(bu, level) {
  state.currentSelection[bu] = level;
  // Update UI for this BU row
  document.querySelectorAll(".invest-row").forEach(row => {
    const label = row.querySelector(".bu-label");
    if (label && label.textContent === bu.toUpperCase()) {
      row.querySelectorAll(".invest-opt").forEach(opt => {
        opt.classList.remove("selected");
        if (opt.getAttribute("data-level") === level && !opt.classList.contains("disabled")) {
          opt.classList.add("selected");
        }
      });
    }
  });
  refreshEffectivePreview();
}
function selectDiv(level) {
  state.currentSelection.div = level;
  document.querySelectorAll(".div-opt").forEach(opt => {
    opt.classList.toggle("selected", opt.getAttribute("data-level") === level);
  });
}

function refreshEffectivePreview() {
  const prev = document.getElementById("effPreview");
  if (!prev) return;
  const zeroInit = state.portfolio.h3.length === 0;
  const activeH3 = state.portfolio.h3.filter(i => i.status === "active").length > 0;
  if (!zeroInit && activeH3) { prev.innerHTML = ""; return; }
  const sel = state.currentSelection;
  if (!sel.h1 || !sel.h2) { prev.innerHTML = ""; return; }
  const b = bucketAmounts(state.currentBudget);
  const h1Base = b[sel.h1] || 0;
  const h2Base = b[sel.h2] || 0;
  const medSplit = b.Medium / 2;
  const h1Eff = h1Base + medSplit;
  const h2Eff = h2Base + medSplit;
  let html = "<div class=\"warn-msg\" style=\"background:#fff8e3;color:var(--ink);border-left-color:var(--gold);\">";
  html += "<strong>Effective allocation preview:</strong> H1 \u2192 " + fmtCr(h1Eff) + " &nbsp;\u00b7&nbsp; H2 \u2192 " + fmtCr(h2Eff);
  html += "</div>";
  prev.innerHTML = html;
}

function submitAllocation() {
  const sel = state.currentSelection;
  const errBox = document.getElementById("allocError");
  errBox.innerHTML = "";
  const zeroInit = state.portfolio.h3.length === 0;
  const activeH3 = state.portfolio.h3.filter(i => i.status === "active").length > 0;
  const useFullThree = activeH3;

  // Validate dividend
  if (!sel.div) {
    errBox.innerHTML = "<div class=\"error-msg\">Select a dividend policy before submitting.</div>";
    return;
  }

  if (useFullThree) {
    // Must have one High, one Medium, one Low across H1/H2/H3 (H3 can additionally be Zero)
    if (!sel.h1 || !sel.h2 || !sel.h3) {
      errBox.innerHTML = "<div class=\"error-msg\">Assign an investment level to H1, H2, and H3.</div>";
      return;
    }
    // H3 Zero special path: still need H1 + H2 to cover High/Medium/Low minus one
    if (sel.h3 === "Zero") {
      // H1 and H2 must cover two of {High, Medium, Low} with no repeats. The remaining bucket is unspent? 
      // Spec: "H3 can additionally be set to Zero (permanently closes all active initiatives)"
      // Interpret: when H3 = Zero, the remaining two of three buckets go to H1 and H2 (no repeats). The Zero choice forfeits the unassigned bucket as overhead.
      // To keep gameplay coherent, require H1 != H2 and both from {High, Medium, Low}.
      if (sel.h1 === sel.h2 || sel.h1 === "Zero" || sel.h2 === "Zero") {
        errBox.innerHTML = "<div class=\"error-msg\">When H3 is closed, H1 and H2 must take two different investment levels from High, Medium, Low.</div>";
        return;
      }
      // Confirm closure
      if (!confirm("Setting H3 to Zero will permanently close all active H3 initiatives. This decision is irreversible. Proceed?")) return;
    } else {
      // Three different levels among High, Medium, Low
      const levels = [sel.h1, sel.h2, sel.h3].sort();
      const expected = ["High", "Low", "Medium"].sort();
      if (JSON.stringify(levels) !== JSON.stringify(expected)) {
        errBox.innerHTML = "<div class=\"error-msg\">Assign exactly one High, one Medium, and one Low across H1, H2, and H3.</div>";
        return;
      }
    }
  } else {
    // Zero-init or no-active-H3 case: H1 and H2 take High and Low (one each)
    if (!sel.h1 || !sel.h2) {
      errBox.innerHTML = "<div class=\"error-msg\">Assign an investment level to H1 and H2.</div>";
      return;
    }
    const pair = [sel.h1, sel.h2].sort();
    if (JSON.stringify(pair) !== JSON.stringify(["High", "Low"])) {
      errBox.innerHTML = "<div class=\"error-msg\">Assign exactly one High and one Low between H1 and H2.</div>";
      return;
    }
    // H3 auto-locked at Zero (silent for zero-init; suppressed warning per spec)
    sel.h3 = "Zero";
  }

  // Compute effective rupees
  const b = bucketAmounts(state.currentBudget);
  let h1Eff, h2Eff, h3Eff;
  if (useFullThree) {
    h1Eff = sel.h1 === "Zero" ? 0 : b[sel.h1];
    h2Eff = sel.h2 === "Zero" ? 0 : b[sel.h2];
    h3Eff = sel.h3 === "Zero" ? 0 : b[sel.h3];
  } else {
    // Medium auto-split
    const medSplit = b.Medium / 2;
    h1Eff = b[sel.h1] + medSplit;
    h2Eff = b[sel.h2] + medSplit;
    h3Eff = 0;
  }
  sel.h1Eff = h1Eff; sel.h2Eff = h2Eff; sel.h3Eff = h3Eff;

  // Run round
  const result = runRound(state.round, sel);
  screenResults(result);
}

  html += "<div class=\"card\">";

    html += "<tr><td><span class=\"pill pill-h3\">H3</span> Initiatives</td><td class=\"mono\" style=\"font-size:12px;\">Zero</td><td class=\"num\">\u20B90</td></tr>";
  } else {
    html += "<tr><td><span class=\"pill pill-h1\">H1</span> Industrial Chemicals</td><td class=\"mono\" style=\"font-size:12px;\">" + sel.h1 + "</td><td class=\"num\">" + fmtCr(sel.h1Eff) + "</td></tr>";
    html += "<tr><td><span class=\"pill pill-h2\">H2</span> Specialty Coatings</td><td class=\"mono\" style=\"font-size:12px;\">" + sel.h2 + "</td><td class=\"num\">" + fmtCr(sel.h2Eff) + "</td></tr>";
    const activeCount = state.portfolio.h3.filter(i => i.status === "active" || i.status === "success").length;
    const perInit = sel.h3 === "Zero" ? 0 : (sel.h3Eff / Math.max(1, state.portfolio.h3.filter(i => i.investHistory[r-1] === true || (r === 1 && sel.h3 !== "Zero")).length || 1));

  html += "<div style=\"margin-top:12px;font-family:'DM Mono',monospace;font-size:11.5px;color:rgba(15,17,23,0.7);\">NEXT CYCLE INVESTMENT BUDGET: <strong style=\"color:var(--ink);\">" + fmtCr(result.nextBudget) + "</strong></div>";

function renderBUResultCard(buCode, buName, pillCls, before, after, profit, key) {
  const revDelta = after.rev - before.rev;
  const revPct = before.rev > 0 ? (revDelta / before.rev) * 100 : 0;
  const marginDelta = after.margin - before.margin;
  let html = "<div class=\"bu-card\">";
  html += "<div class=\"bu-head\"><div class=\"bu-title\"><span class=\"pill " + pillCls + "\">" + buCode + "</span> &nbsp;" + buName + "</div></div>";
  html += "<div class=\"metrics-row\">";
  html += "<div class=\"metric\"><div class=\"label\">Revenue</div><div class=\"value\">" + fmtCr(after.rev) + "</div><div class=\"delta " + (revDelta > 0 ? "delta-up" : revDelta < 0 ? "delta-down" : "delta-flat") + "\">" + (revDelta >= 0 ? "+" : "") + fmtCr(Math.abs(revDelta) * Math.sign(revDelta)) + " \u00b7 " + (revPct >= 0 ? "+" : "") + revPct.toFixed(1) + "%</div></div>";
  html += "<div class=\"metric\"><div class=\"label\">Margin</div><div class=\"value\">" + after.margin.toFixed(1) + "%</div><div class=\"delta " + (marginDelta > 0 ? "delta-up" : marginDelta < 0 ? "delta-down" : "delta-flat") + "\">" + (marginDelta >= 0 ? "+" : "") + marginDelta.toFixed(1) + "pp</div></div>";
  html += "<div class=\"metric\"><div class=\"label\">Profit</div><div class=\"value\">" + fmtCr(profit) + "</div></div>";
  html += "</div>";

  // H1 exit warning
  if (key === "h1" && after.margin <= 1.0) {
    html += "<div class=\"error-msg\" style=\"margin-bottom:10px;\"><strong>Approaching exit threshold:</strong> H1 margin has compressed to " + after.margin.toFixed(1) + "%. The business is approaching loss-making territory and the board may need to consider divestment scenarios.</div>";
  }

  // Signal
  const sig = key === "h1" ? computeH1Signal(revPct) : computeH2Signal(revPct);
  if (sig) html += "<div class=\"signal " + sig.cls + "\">" + sig.text + "</div>";
  html += "</div>";
  return html;
}

function computeH1Signal(declinePct) {
  const dec = Math.abs(declinePct);
  if (declinePct >= 0) {
    return { cls: "signal-amber", text: "\uD83D\uDFE1 Revenue base held this cycle \u2014 underlying pressures remain but did not fully materialise in this period" };
  }
  if (dec > 40) return { cls: "signal-red", text: "\uD83D\uDD34 Significant volume contraction this cycle \u2014 market conditions have deteriorated materially" };
  if (dec >= 20) return { cls: "signal-red", text: "\uD83D\uDD34 Revenue base has contracted sharply \u2014 structural demand shifts appear to be accelerating" };
  if (dec >= 10) return { cls: "signal-amber", text: "\uD83D\uDFE1 Continued decline in line with broader market trends \u2014 trajectory remains negative" };
  return { cls: "signal-amber", text: "\uD83D\uDFE1 Revenue decline has moderated this cycle \u2014 underlying pressures remain" };
}
function computeH2Signal(growthPct) {
  if (growthPct > 20) return { cls: "signal-green", text: "\uD83D\uDFE2 Growth has exceeded expectations this cycle \u2014 the business is scaling meaningfully" };
  if (growthPct >= 10) return { cls: "signal-green", text: "\uD83D\uDFE2 Solid growth trajectory \u2014 the business is gaining commercial ground" };
  if (growthPct >= 5) return { cls: "signal-amber", text: "\uD83D\uDFE1 Growth has come in below prior-cycle rates \u2014 the pace of scaling is worth watching" };
  return { cls: "signal-red", text: "\uD83D\uDD34 Growth has been softer than the investment thesis anticipated \u2014 market dynamics warrant a closer look" };
}

function renderH3ResultCard(init, result) {
  const roll = result.h3Rolls.find(r => r.id === init.id);
  let html = "<div class=\"bu-card\">";
  html += "<div class=\"bu-head\"><div class=\"bu-title\"><span class=\"pill pill-h3\">H3</span> &nbsp;" + init.name + "</div>";
  let statusPill = "";
  if (init.status === "success") statusPill = "<span class=\"pill pill-success\">Commercial</span>";
  else if (init.status === "failed") statusPill = "<span class=\"pill pill-closed\">Written off</span>";
  else if (init.status === "closed") statusPill = "<span class=\"pill pill-closed\">Closed</span>";
  else statusPill = "<span class=\"pill pill-h3\">In Development</span>";
  html += "<div>" + statusPill + "</div></div>";

  // Revised estimate panel (only for active or just-resolved)
  if (init.status === "active" && init.revisedSentiment) {
    let sigCls = "delta-flat";
    if (init.revisedDirection === "up") sigCls = "delta-up";
    else if (init.revisedDirection === "down") sigCls = "delta-down";
    html += "<div class=\"revised-panel\">";
    html += "<div class=\"rp-label\">Board Intelligence \u2014 Revised Potential Estimate</div>";
    html += "<div class=\"rp-line\"><span class=\"rp-original\">" + fmtCr(init.origSizeMin) + " \u2013 " + fmtCr(init.origSizeMax) + "</span> &rarr; <strong>" + fmtCr(init.curSizeMin) + " \u2013 " + fmtCr(init.curSizeMax) + "</strong></div>";
    html += "<div class=\"rp-sentiment " + sigCls + "\">" + init.revisedSentiment + "</div>";
    html += "</div>";
  }

  // Outcome
  if (roll) {
    if (roll.outcome === "success") {
      html += "<div class=\"signal signal-green\" style=\"margin-top:10px;\">\uD83D\uDFE2 Breakthrough achieved \u2014 new growth engine coming online. Initial commercial revenue: <strong>" + fmtCr(init.revenue) + "</strong></div>";
    } else if (roll.outcome === "failed") {
      html += "<div class=\"signal signal-red\" style=\"margin-top:10px;\">\uD83D\uDD34 Initiative did not achieve commercial viability \u2014 written off permanently</div>";
    } else if (roll.outcome === "closed") {
      html += "<div class=\"signal signal-red\" style=\"margin-top:10px;\">\uD83D\uDD34 Initiative closed \u2014 investment written off</div>";
    } else if (roll.outcome === "miss") {
      html += "<div class=\"signal signal-amber\" style=\"margin-top:10px;\">\uD83D\uDFE1 Initiative is progressing through its development phase \u2014 commercial milestones not yet achieved</div>";
    } else if (roll.outcome === "progressing") {
      const sustained = init.investHistory.filter(x => x).length >= 2;
      if (sustained) html += "<div class=\"signal signal-amber\" style=\"margin-top:10px;\">\uD83D\uDFE1 Initiative has received sustained funding \u2014 early indicators are emerging</div>";
      else html += "<div class=\"signal signal-amber\" style=\"margin-top:10px;\">\uD83D\uDFE1 Initiative is progressing through its development phase</div>";
    }
  }

  // Active and already commercial: show revenue
  if (init.status === "success") {
    html += "<div class=\"metrics-row\" style=\"margin-top:12px;\">";
    html += "<div class=\"metric\"><div class=\"label\">Commercial Revenue</div><div class=\"value\">" + fmtCr(init.revenue) + "</div></div>";
    html += "<div class=\"metric\"><div class=\"label\">Margin</div><div class=\"value\">5.0%</div></div>";
    html += "<div class=\"metric\"><div class=\"label\">Profit Contribution</div><div class=\"value\">" + fmtCr(init.revenue * 0.05) + "</div></div>";
    html += "</div>";
  }
  html += "</div>";
  return html;
}

function computeDividendSignal(result, round) {
  const div = result.div;
  // Profit trend
  let trend = "flat";
  if (round > 1) {
    const prior = state.rounds[round - 2].profit;
    if (result.profit < prior * 0.85) trend = "decline";
    else if (result.profit > prior * 1.05) trend = "growth";
  }
  // Investment strength on H2/H3 last cycle
  const h2OrH3Strong = (result.h2 === "High" || result.h2 === "Medium" || result.h3 === "High" || result.h3 === "Medium");
  if (div === "High" && trend === "decline") {
    return { cls: "signal-red", text: "\uD83D\uDD34 Significant capital returned to shareholders against a backdrop of declining profit \u2014 the reinvestment thesis bears closer scrutiny" };
  }
  if (div === "High") {
    return { cls: "signal-amber", text: "\uD83D\uDFE1 Substantial returns delivered to shareholders \u2014 reinvestment headroom in future cycles is correspondingly tighter" };
  }
  if (div === "Medium") {
    return { cls: "signal-amber", text: "\uD83D\uDFE1 Balanced capital allocation \u2014 measured shareholder return alongside reinvestment" };
  }
  if (div === "Low" && h2OrH3Strong) {
    return { cls: "signal-green", text: "\uD83D\uDFE2 Capital retained for reinvestment \u2014 supports continued portfolio transition" };
  }
  return { cls: "signal-amber", text: "\uD83D\uDFE1 Capital retained but the reinvestment thesis remains to be demonstrated in subsequent rounds" };
}

function advanceToNextRound(nextBudget) {
  state.round += 1;
  state.currentBudget = nextBudget;
  updateHeader();
  screenAllocation();
}

// ============================================================
//  SCREEN 5 — FINAL
// ============================================================
function screenFinal() {
  const finalVal = computeValuation();
  const tsr = state.cumulativeDividends + finalVal.total;
  const h3Successes = state.portfolio.h3.filter(i => i.status === "success").length;

  // CAGR computations for cross-team comparison panel
  const startRev = state.startTotalRevenue;
  const endRev = state.portfolio.h1.rev + state.portfolio.h2.rev +
    state.portfolio.h3.filter(i => i.status === "success").reduce((s, i) => s + i.revenue, 0);
  const startProfit = state.startTotalProfit;
  const endProfit = state.rounds[2].profit;
  const startValuation = state.portfolio.h1.startRev * 0.6 + state.portfolio.h2.startRev * 5;
  const revenueCAGR = cagr(startRev, endRev, 9);
  const profitCAGR = cagr(startProfit, endProfit, 9);
  const valuationCAGR = cagr(startValuation, finalVal.total, 9);
  const tsrCAGR = cagr(startValuation, tsr, 9);
  // Store on state for submission
  state.cagrRevenue = revenueCAGR;
  state.cagrProfit = profitCAGR;
  state.cagrValuation = valuationCAGR;
  state.cagrTsr = tsrCAGR;
  let tier, tierIcon, tierTitle, tierBody;
  const h1Share = finalVal.h1 / Math.max(1, finalVal.total);
  const highDivCount = state.rounds.filter(r => r.div === "High").length;
  const h3Failed = state.portfolio.h3.filter(i => i.status === "failed").length;
  const h3Closed = state.portfolio.h3.filter(i => i.status === "closed").length;

  if (finalVal.total > 25000 && h3Successes >= 1) {
    tier = "t1"; tierIcon = "\uD83C\uDFC6";
    tierTitle = "Portfolio Assessment \u2014 Arvika 2034";
    tierBody = "The portfolio has fundamentally repositioned over the review period. Sustained H3 commitment has produced " + h3Successes + " new commercial growth platform" + (h3Successes > 1 ? "s" : "") + ", and the bridge business has scaled meaningfully alongside the legacy core. Final portfolio valuation stands at " + fmtCr(finalVal.total) + "." + (tsr > finalVal.total * 1.15 ? " Total shareholder return of " + fmtCr(tsr) + " reflects strong returns delivered alongside the reinvestment programme." : " The leadership team has prioritised long-horizon value creation, and the market-implied valuation reflects that conviction.");
  } else if (finalVal.total > 18000) {
    tier = "t2"; tierIcon = "\u2705";
    tierTitle = "Portfolio Assessment \u2014 Arvika 2034";
    tierBody = "The portfolio has navigated the transition with discipline. Core defence and growth investment have been balanced, with final valuation of " + fmtCr(finalVal.total) + "." + (h3Successes > 0 ? " The H3 programme delivered " + h3Successes + " commercial success" + (h3Successes > 1 ? "es" : "") + ", strengthening the long-term portfolio position." : (h3Failed + h3Closed > 0 ? " H3 outcomes were mixed \u2014 the initiatives pursued did not all reach commercial viability, but the core portfolio held its ground." : " H3 outcomes did not materialise in this period.")) + (highDivCount >= 2 ? " The decision to pay high dividends in multiple cycles meant reinvestment headroom was tighter than it might have been." : "");
  } else if (finalVal.total > 12000) {
    tier = "t3"; tierIcon = "\u26A0\uFE0F";
    tierTitle = "Portfolio Assessment \u2014 Arvika 2034";
    tierBody = "The portfolio has come through the period intact but with limited transformation. Final valuation of " + fmtCr(finalVal.total) + " is acceptable in the near term but leaves the business exposed to continued H1 contraction." + (h1Share > 0.7 ? " H1 still represents over 70% of portfolio value, indicating significant concentration risk going forward." : "") + (h3Successes > 0 ? " The H3 programme produced " + h3Successes + " commercial outcome, providing some optionality." : (h3Failed + h3Closed > 0 ? " H3 initiatives did not deliver commercial outcomes during the review period." : " No H3 progress was realised.")) + (highDivCount >= 2 ? " Repeated high-dividend choices compounded the reinvestment shortfall." : "");
  } else {
    tier = "t4"; tierIcon = "\uD83D\uDD34";
    tierTitle = "Portfolio Assessment \u2014 Arvika 2034";
    tierBody = "The portfolio has materially underperformed the strategic ambition set at the start of the review period. Final valuation of " + fmtCr(finalVal.total) + " and TSR of " + fmtCr(tsr) + " indicate that the transition was not executed effectively." + (h3Failed + h3Closed > 0 ? " H3 initiatives were either closed or written off, eliminating the optionality the corporate development team had identified." : "") + (h1Share > 0.7 ? " The portfolio remains dominated by a declining H1 base." : "") + (highDivCount >= 2 ? " High dividend payouts taken under declining profits compounded the capital constraint, accelerating the structural problem." : "") + " The board will need to consider whether a more substantive intervention is required.";
  }

  let html = "<div class=\"screen\">";

  html += "<div class=\"verdict-card " + tier + "\">";
  html += "<div style=\"font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.16em;opacity:0.85;margin-bottom:8px;\">BOARD STRATEGIC REVIEW \u00b7 FINAL VERDICT</div>";
  html += "<h2>" + tierIcon + " " + tierTitle + "</h2>";
  html += "<p>" + tierBody + "</p>";
  html += "</div>";

  // Scorecard
  html += "<div class=\"section-heading\">Final Scorecard</div>";
  html += "<div class=\"scorecard\">";
  html += "<div class=\"score-cell primary\"><div class=\"sc-label\">Portfolio Valuation (2034)</div><div class=\"sc-value\">" + fmtCr(finalVal.total) + "</div><div style=\"font-family:'DM Mono',monospace;font-size:11px;color:var(--gold-light);margin-top:8px;\">Forward-looking, market-implied value</div></div>";
  html += "<div class=\"score-cell secondary\"><div class=\"sc-label\">Total Shareholder Return</div><div class=\"sc-value\">" + fmtCr(tsr) + "</div><div style=\"font-family:'DM Mono',monospace;font-size:11px;color:rgba(15,17,23,0.6);margin-top:8px;\">Cumulative dividends (" + fmtCr(state.cumulativeDividends) + ") + final valuation</div></div>";
  html += "</div>";
  html += "<p class=\"scorecard-note\">" + (finalVal.total > tsr ? "Portfolio Valuation exceeds TSR \u2014 the leadership team prioritised reinvestment over near-term distribution." : "TSR exceeds Portfolio Valuation \u2014 substantial capital has been returned to shareholders relative to ending portfolio value.") + "</p>";

  // CAGR cross-team comparison panel
  html += "<div class=\"card\" style=\"margin-top:20px;\">";
  html += "<div class=\"card-eyebrow\">Cross-Team Comparison \u00b7 Normalised for Starting Position</div>";
  html += "<h3>Portfolio Performance \u2014 CAGR over 9 Years</h3>";
  html += "<p class=\"text-mute\" style=\"margin-bottom:16px;\">Compounded annual growth rates allow comparison across teams who began with different starting portfolios. Wildcard events and H3 outcomes introduce variance that CAGR does not adjust for.</p>";
  html += "<div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px;\">";
  html += "<div class=\"metric\"><div class=\"label\">Revenue CAGR</div><div class=\"value\" style=\"font-size:26px;color:" + (revenueCAGR !== null && revenueCAGR >= 0 ? "var(--green)" : "var(--red)") + ";\">" + fmtCagr(revenueCAGR) + "</div><div class=\"text-mute\" style=\"font-size:11px;margin-top:4px;\">" + fmtCr(startRev) + " \u2192 " + fmtCr(Math.round(endRev)) + "</div></div>";
  html += "<div class=\"metric\"><div class=\"label\">Profit CAGR</div><div class=\"value\" style=\"font-size:26px;color:" + (profitCAGR !== null && profitCAGR >= 0 ? "var(--green)" : "var(--red)") + ";\">" + fmtCagr(profitCAGR) + "</div><div class=\"text-mute\" style=\"font-size:11px;margin-top:4px;\">" + fmtCr(Math.round(startProfit)) + " \u2192 " + fmtCr(Math.round(endProfit)) + "</div></div>";
  html += "<div class=\"metric\"><div class=\"label\">Valuation CAGR</div><div class=\"value\" style=\"font-size:26px;color:" + (valuationCAGR !== null && valuationCAGR >= 0 ? "var(--green)" : "var(--red)") + ";\">" + fmtCagr(valuationCAGR) + "</div><div class=\"text-mute\" style=\"font-size:11px;margin-top:4px;\">" + fmtCr(Math.round(startValuation)) + " \u2192 " + fmtCr(Math.round(finalVal.total)) + "</div></div>";
  html += "<div class=\"metric\"><div class=\"label\">TSR CAGR</div><div class=\"value\" style=\"font-size:26px;color:" + (tsrCAGR !== null && tsrCAGR >= 0 ? "var(--green)" : "var(--red)") + ";\">" + fmtCagr(tsrCAGR) + "</div><div class=\"text-mute\" style=\"font-size:11px;margin-top:4px;\">" + fmtCr(Math.round(startValuation)) + " \u2192 " + fmtCr(Math.round(tsr)) + "</div></div>";
  html += "</div></div>";

  // Final portfolio table
  html += "<div class=\"card\" style=\"margin-top:24px;\">";
  html += "<div class=\"card-eyebrow\">Final Portfolio Composition</div>";
  html += "<h3>Arvika in 2034</h3>";
  html += "<table class=\"portfolio-table\">";
  html += "<thead><tr><th>Business</th><th class=\"num\">Revenue</th><th class=\"num\">Margin</th><th class=\"num\">Profit</th><th class=\"num\">Valuation</th></tr></thead><tbody>";
  html += "<tr><td><span class=\"pill pill-h1\">H1</span> Industrial Chemicals</td><td class=\"num\">" + fmtCr(state.portfolio.h1.rev) + "</td><td class=\"num\">" + state.portfolio.h1.margin.toFixed(1) + "%</td><td class=\"num\">" + fmtCr(state.portfolio.h1.rev * state.portfolio.h1.margin / 100) + "</td><td class=\"num\">" + fmtCr(finalVal.h1) + "</td></tr>";
  html += "<tr><td><span class=\"pill pill-h2\">H2</span> Specialty Coatings</td><td class=\"num\">" + fmtCr(state.portfolio.h2.rev) + "</td><td class=\"num\">" + state.portfolio.h2.margin.toFixed(1) + "%</td><td class=\"num\">" + fmtCr(state.portfolio.h2.rev * state.portfolio.h2.margin / 100) + "</td><td class=\"num\">" + fmtCr(finalVal.h2) + "</td></tr>";
  state.portfolio.h3.forEach(init => {
    let revStr = "\u2014", marStr = "\u2014", profStr = "\u2014", valStr = "\u2014";
    let pill = "pill-h3";
    if (init.status === "success") {
      pill = "pill-success";
      revStr = fmtCr(init.revenue); marStr = "5.0%"; profStr = fmtCr(init.revenue * 0.05);
      const displayMultiple = init.successRound === 2 ? 6 : 3;
      valStr = fmtCr(init.revenue * displayMultiple);
    } else if (init.status === "failed") { pill = "pill-closed"; valStr = "Written off"; }
    else if (init.status === "closed") { pill = "pill-closed"; valStr = "Closed"; }
    else { valStr = "Active (optionality)"; }
    html += "<tr><td><span class=\"pill " + pill + "\">H3</span> " + init.name + "</td><td class=\"num\">" + revStr + "</td><td class=\"num\">" + marStr + "</td><td class=\"num\">" + profStr + "</td><td class=\"num\">" + valStr + "</td></tr>";
  });
  html += "</tbody>";
  html += "<tfoot><tr><td colspan=\"4\">Total Portfolio Valuation</td><td class=\"num\">" + fmtCr(finalVal.total) + "</td></tr></tfoot>";
  html += "</table>";
  html += "</div>";

  // Game log
  html += "<div class=\"card\">";
  html += "<div class=\"card-eyebrow\">Complete Game Log</div>";
  html += "<h3>Round-by-Round Decisions &amp; Outcomes</h3>";
  html += "<div style=\"overflow-x:auto;\"><table class=\"game-log\">";
  html += "<thead><tr><th>Round</th><th>Budget</th><th>H1</th><th>H2</th><th>H3</th><th>Div</th><th>Wildcard</th><th>H3 Roll</th><th>Div Paid</th><th>Valuation</th></tr></thead><tbody>";
  state.rounds.forEach(r => {
    const wcStr = r.wildcard ? r.wildcard.replace("_", " ") : "\u2014";
    const rollStr = r.h3Rolls.length === 0 ? "\u2014" : r.h3Rolls.map(rl => rl.id + ":" + rl.outcome).join(", ");
    html += "<tr><td class=\"num\">" + r.round + "</td><td class=\"num\">" + fmt(r.budget) + "</td><td>" + r.h1 + "</td><td>" + r.h2 + "</td><td>" + r.h3 + "</td><td>" + r.div + "</td><td>" + wcStr + "</td><td>" + rollStr + "</td><td class=\"num\">" + fmt(r.divPaid) + "</td><td class=\"num\">" + fmt(r.valuation.total) + "</td></tr>";
  });
  html += "</tbody></table></div>";
  html += "</div>";

  // Submission
  html += "<div class=\"card\" style=\"background:var(--cream);\">";
  html += "<div class=\"card-eyebrow\">Facilitator Submission</div>";
  html += "<h3>Submit Results for Debrief</h3>";
  html += "<p class=\"text-mute\" style=\"margin-bottom:14px;\">Submit your team's run to the facilitator. This captures all decisions and outcomes for the post-simulation debrief discussion.</p>";
  html += "<button class=\"btn-gold\" onclick=\"submitToFacilitator()\">Submit to Facilitator</button>";
  html += "<div id=\"submitStatus\"></div>";
  html += "</div>";

  html += "</div>";
  show(html);
}

// ============================================================
//  SUBMISSION
// ============================================================
function submitToFacilitator() {
  const statusBox = document.getElementById("submitStatus");
  // Guard against placeholder URL
  if (GOOGLE_SHEET_URL.indexOf("REPLACE_WITH") !== -1) {
    statusBox.innerHTML = "<div class=\"submit-status warn\">Submission endpoint not configured. The facilitator must set the Google Sheet web app URL before submissions can be recorded. Please notify the facilitator.</div>";
    return;
  }
  const finalVal = computeValuation();
  const tsr = state.cumulativeDividends + finalVal.total;
  const params = {
    team: state.team,
    ts: new Date().toISOString(),
    finalVal: Math.round(finalVal.total),
    tsr: Math.round(tsr),
    totalDividends: Math.round(state.cumulativeDividends),
    startH1Rev: state.portfolio.h1.startRev,
    startH1Margin: state.portfolio.h1.startMargin,
    startH1Profit: Math.round(state.startH1Profit),
    startH2Rev: state.portfolio.h2.startRev,
    startH2Margin: state.portfolio.h2.startMargin,
    startH2Profit: Math.round(state.startH2Profit),
    startTotalRevenue: state.startTotalRevenue,
    startTotalProfit: Math.round(state.startTotalProfit),
    portfolioProfile: state.portfolioProfile,
    h3Count: state.drawn.length,
    h3Initiatives: state.drawn.map(d => d.id).join("|"),
    h3Types: state.drawn.map(d => d.type).join("|"),
    h3Selected: state.selected.join("|"),
    initiatives: state.portfolio.h3.map(i => i.id).join("|"),
    h3status: state.portfolio.h3.map(i => i.id + ":" + i.status + (i.status === "success" ? ":" + Math.round(i.revenue) : "")).join("|"),
    h1Final: Math.round(state.portfolio.h1.rev) + "@" + state.portfolio.h1.margin.toFixed(1),
    h2Final: Math.round(state.portfolio.h2.rev) + "@" + state.portfolio.h2.margin.toFixed(1),
    revenueCAGR: state.cagrRevenue !== null && state.cagrRevenue !== undefined ? state.cagrRevenue.toFixed(1) : "na",
    profitCAGR: state.cagrProfit !== null && state.cagrProfit !== undefined ? state.cagrProfit.toFixed(1) : "na",
    valuationCAGR: state.cagrValuation !== null && state.cagrValuation !== undefined ? state.cagrValuation.toFixed(1) : "na",
    tsrCAGR: state.cagrTsr !== null && state.cagrTsr !== undefined ? state.cagrTsr.toFixed(1) : "na"
  };
  state.rounds.forEach((rd, idx) => {
    const n = idx + 1;
    params["r" + n + "budget"] = rd.budget;
    params["r" + n + "h1"] = rd.h1;
    params["r" + n + "h2"] = rd.h2;
    params["r" + n + "h3"] = rd.h3;
    params["r" + n + "div"] = rd.div;
    params["r" + n + "wc"] = rd.wildcard || "none";
    params["r" + n + "roll"] = rd.h3Rolls.map(r => r.id + ":" + r.outcome).join(";");
    params["r" + n + "divpaid"] = Math.round(rd.divPaid);
    params["r" + n + "val"] = Math.round(rd.valuation.total);
  });
  const qs = Object.keys(params).map(k => encodeURIComponent(k) + "=" + encodeURIComponent(params[k])).join("&");

  statusBox.innerHTML = "<div class=\"submit-status warn\">Submitting...</div>";

  const img = new Image();
  let done = false;
  img.onload = img.onerror = function() {
    if (!done) { done = true; showSubmitSuccess(); }
  };
  setTimeout(function() {
    if (!done) { done = true; showSubmitSuccess(); }
  }, 4000);
  img.src = GOOGLE_SHEET_URL + (GOOGLE_SHEET_URL.indexOf("?") === -1 ? "?" : "&") + qs;
}
function showSubmitSuccess() {
  const statusBox = document.getElementById("submitStatus");
  if (statusBox) statusBox.innerHTML = "<div class=\"submit-status success\"><strong>Submitted.</strong> Your team's results have been recorded. Stand by for the facilitator debrief.</div>";
}

// ============================================================
//  BOOT
// ============================================================
screenWelcome();

</script>
</body>
</html>
